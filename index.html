<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WHO WOULD WIN?</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        body {
            min-height: 100dvh;
            background: linear-gradient(to bottom, #4488aa 0%, #88ccff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding:
                max(10px, env(safe-area-inset-top, 0px))
                max(10px, env(safe-area-inset-right, 0px))
                max(10px, env(safe-area-inset-bottom, 0px))
                max(10px, env(safe-area-inset-left, 0px));
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
        }

        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 1;
            max-width: 100%;
            max-height: 100%;
            background: linear-gradient(to bottom, #cc8844 0%, #884422 100%);
            padding: 8px;
            border-radius: 12px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 5px 5px 20px rgba(0,0,0,0.8);
            border: 3px solid #ffcc88;
            box-sizing: border-box;
        }

        canvas {
            display: block;
            aspect-ratio: 1 / 1;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            image-rendering: auto;
            image-rendering: -webkit-optimize-contrast;
            background-color: #f5f5f5;
            border: 4px solid #000000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="768" height="768"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
