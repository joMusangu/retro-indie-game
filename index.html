<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GB Fight Codex</title>
    <style>
        body {
            background: linear-gradient(to bottom, #4488aa 0%, #88ccff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
        }

        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #cc8844 0%, #884422 100%);
            padding: 8px;
            border-radius: 12px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 5px 5px 20px rgba(0,0,0,0.8);
            border: 3px solid #ffcc88;
        }

        canvas {
            /* Modern Vector Minimalist - High Resolution */
            width: 768px;
            height: 768px;
            /* Smooth rendering for modern vector style */
            image-rendering: auto;
            image-rendering: -webkit-optimize-contrast;
            background-color: #f5f5f5;
            border: 4px solid #000000;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="768" height="768"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
